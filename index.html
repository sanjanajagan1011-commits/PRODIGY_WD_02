<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --ring: #1e1e30;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow: rgba(124,58,237,0.4);
    --glow2: rgba(6,182,212,0.3);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .tag {
    display: inline-block;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 0.25rem 0.75rem;
    border-radius: 2rem;
    margin-bottom: 0.75rem;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 1.8rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #a78bfa, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Clock face */
  .clock-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  .clock-ring {
    position: relative;
    width: 280px;
    height: 280px;
  }

  .clock-ring svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }

  .ring-bg {
    fill: none;
    stroke: var(--ring);
    stroke-width: 6;
  }

  .ring-progress {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 816;
    stroke-dashoffset: 816;
    transition: stroke-dashoffset 0.05s linear;
  }

  .clock-face {
    position: absolute;
    inset: 20px;
    background: radial-gradient(circle at 40% 35%, #1a1a2e, #0d0d1a);
    border-radius: 50%;
    border: 1px solid rgba(124,58,237,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 40px rgba(124,58,237,0.15) inset,
      0 0 0 1px rgba(255,255,255,0.03);
  }

  .time-display {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 7vw, 2.8rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    color: #fff;
    text-shadow: 0 0 20px var(--glow);
    line-height: 1;
  }

  .ms-display {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
    margin-top: 4px;
    text-shadow: 0 0 10px var(--glow2);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-top: 12px;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.running {
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.7; }
  }

  /* Buttons */
  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .btn {
    position: relative;
    padding: 0.75rem 2rem;
    border: none;
    border-radius: 0.5rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:hover::after { opacity: 1; }
  .btn:active { transform: scale(0.96); }

  .btn-start {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: #fff;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    min-width: 120px;
  }

  .btn-pause {
    background: linear-gradient(135deg, #0891b2, #0e7490);
    color: #fff;
    box-shadow: 0 4px 20px rgba(8,145,178,0.4);
    min-width: 120px;
  }

  .btn-lap {
    background: rgba(245,158,11,0.15);
    color: var(--accent3);
    border: 1px solid rgba(245,158,11,0.3);
    box-shadow: 0 2px 10px rgba(245,158,11,0.1);
  }

  .btn-reset {
    background: rgba(239,68,68,0.12);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.25);
    box-shadow: 0 2px 10px rgba(239,68,68,0.08);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Laps */
  .laps-section {
    width: 100%;
  }

  .laps-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 0.25rem;
    margin-bottom: 0.75rem;
  }

  .laps-title {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .lap-count {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .laps-list {
    max-height: 260px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    padding-right: 0.25rem;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }

  .laps-list:empty::after {
    content: 'Lap times will appear here';
    display: block;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 2rem;
    border: 1px dashed rgba(100,116,139,0.2);
    border-radius: 0.5rem;
  }

  .lap-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 0.5rem;
    padding: 0.6rem 1rem;
    font-size: 0.875rem;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lap-num {
    color: var(--muted);
    font-size: 0.75rem;
    font-family: 'Orbitron', monospace;
  }

  .lap-time {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    color: var(--text);
  }

  .lap-delta {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .lap-item.fastest .lap-time { color: #22c55e; text-shadow: 0 0 6px rgba(34,197,94,0.4); }
  .lap-item.slowest .lap-time { color: #f87171; }

  .lap-badge {
    font-size: 0.6rem;
    padding: 0.1rem 0.4rem;
    border-radius: 0.2rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-fast { background: rgba(34,197,94,0.15); color: #22c55e; }
  .badge-slow { background: rgba(248,113,113,0.15); color: #f87171; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>STOPWATCH</h1>
  </header>

  <div class="clock-wrap">
    <div class="clock-ring">
      <svg viewBox="0 0 280 280" width="280" height="280">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="140" cy="140" r="130"/>
        <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="130"/>
      </svg>
      <div class="clock-face">
        <div class="time-display" id="timeDisplay">00:00:00</div>
        <div class="ms-display" id="msDisplay">.00</div>
        <div class="status-dot" id="statusDot"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="startBtn" onclick="startStop()">START</button>
    <button class="btn btn-lap" id="lapBtn" onclick="recordLap()" disabled>LAP</button>
    <button class="btn btn-reset" id="resetBtn" onclick="reset()" disabled>RESET</button>
  </div>

  <div class="laps-section">
    <div class="laps-header">
      <span class="laps-title">Lap Times</span>
      <span class="lap-count" id="lapCount">0 LAPS</span>
    </div>
    <div class="laps-list" id="lapsList"></div>
  </div>
</div>

<script>
  let running = false;
  let startTime = 0;
  let elapsed = 0;
  let rafId = null;
  let laps = [];
  let lastLapTime = 0;

  const timeDisplay = document.getElementById('timeDisplay');
  const msDisplay = document.getElementById('msDisplay');
  const statusDot = document.getElementById('statusDot');
  const startBtn = document.getElementById('startBtn');
  const lapBtn = document.getElementById('lapBtn');
  const resetBtn = document.getElementById('resetBtn');
  const lapsList = document.getElementById('lapsList');
  const lapCount = document.getElementById('lapCount');
  const ring = document.getElementById('ringProgress');
  const CIRCUMFERENCE = 2 * Math.PI * 130;

  function format(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
  }

  function formatMs(ms) {
    return '.' + String(Math.floor((ms % 1000) / 10)).padStart(2, '0');
  }

  function updateRing(ms) {
    const secs = (ms / 1000) % 60;
    const fraction = secs / 60;
    const offset = CIRCUMFERENCE * (1 - fraction);
    ring.style.strokeDashoffset = offset;
  }

  function tick() {
    elapsed = Date.now() - startTime;
    timeDisplay.textContent = format(elapsed);
    msDisplay.textContent = formatMs(elapsed);
    updateRing(elapsed);
    rafId = requestAnimationFrame(tick);
  }

  function startStop() {
    if (!running) {
      startTime = Date.now() - elapsed;
      running = true;
      rafId = requestAnimationFrame(tick);
      startBtn.textContent = 'PAUSE';
      startBtn.className = 'btn btn-pause';
      statusDot.className = 'status-dot running';
      lapBtn.disabled = false;
      resetBtn.disabled = false;
    } else {
      running = false;
      cancelAnimationFrame(rafId);
      startBtn.textContent = 'RESUME';
      startBtn.className = 'btn btn-start';
      statusDot.className = 'status-dot';
    }
  }

  function recordLap() {
    if (!running) return;
    const lapTime = elapsed - lastLapTime;
    laps.unshift({ n: laps.length + 1, total: elapsed, lap: lapTime });
    lastLapTime = elapsed;
    renderLaps();
  }

  function reset() {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed = 0;
    lastLapTime = 0;
    laps = [];
    timeDisplay.textContent = '00:00:00';
    msDisplay.textContent = '.00';
    ring.style.strokeDashoffset = CIRCUMFERENCE;
    statusDot.className = 'status-dot';
    startBtn.textContent = 'START';
    startBtn.className = 'btn btn-start';
    lapBtn.disabled = true;
    resetBtn.disabled = true;
    lapsList.innerHTML = '';
    lapCount.textContent = '0 LAPS';
  }

  function renderLaps() {
    lapCount.textContent = laps.length + ' LAP' + (laps.length !== 1 ? 'S' : '');
    if (laps.length < 2) { lapsList.innerHTML = ''; buildLapItem(laps[0], false, false); return; }

    const times = laps.map(l => l.lap);
    const fastest = Math.min(...times);
    const slowest = Math.max(...times);

    lapsList.innerHTML = '';
    laps.forEach(l => buildLapItem(l, l.lap === fastest, l.lap === slowest && laps.length > 1));
  }

  function buildLapItem(l, isFast, isSlow) {
    if (!l) return;
    const div = document.createElement('div');
    div.className = 'lap-item' + (isFast ? ' fastest' : isSlow ? ' slowest' : '');
    const t = l.lap;
    const lapStr = format(t) + formatMs(t);

    let badge = '';
    if (isFast && laps.length > 1) badge = '<span class="lap-badge badge-fast">Best</span>';
    else if (isSlow) badge = '<span class="lap-badge badge-slow">Slow</span>';

    div.innerHTML = `
      <span class="lap-num">LAP ${String(l.n).padStart(2,'0')}</span>
      <span class="lap-time">${lapStr}</span>
      <span class="lap-delta">${badge}</span>
    `;
    lapsList.appendChild(div);
  }

  // Init ring
  ring.style.strokeDashoffset = CIRCUMFERENCE;
</script>
</body>
</html>
