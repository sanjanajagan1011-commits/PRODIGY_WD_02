<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>STOPWATCH</h1>
  </header>

  <div class="clock-wrap">
    <div class="clock-ring">
      <svg viewBox="0 0 280 280" width="280" height="280">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="140" cy="140" r="130"/>
        <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="130"/>
      </svg>
      <div class="clock-face">
        <div class="time-display" id="timeDisplay">00:00:00</div>
        <div class="ms-display" id="msDisplay">.00</div>
        <div class="status-dot" id="statusDot"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="startBtn" onclick="startStop()">START</button>
    <button class="btn btn-lap" id="lapBtn" onclick="recordLap()" disabled>LAP</button>
    <button class="btn btn-reset" id="resetBtn" onclick="reset()" disabled>RESET</button>
  </div>

  <div class="laps-section">
    <div class="laps-header">
      <span class="laps-title">Lap Times</span>
      <span class="lap-count" id="lapCount">0 LAPS</span>
    </div>
    <div class="laps-list" id="lapsList"></div>
  </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
